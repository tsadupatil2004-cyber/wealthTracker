<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <header>
            <h1>Wealth Tracker</h1>
        </header>

        <div class="container">
            <aside class="sidebar">
                <div class="card balance-card">
                    <h4>Current Balance</h4>
                    <h1 id="balance">$0.00</h1>
                    <div class="mini-stats">
                        <div class="stat">
                            <small>Income</small>
                            <p id="money_plus" class="plus">+$0.00</p>
                        </div>
                        <div class="stat border-left">
                            <small>Expenses</small>
                            <p id="money_minus" class="minus">-$0.00</p>
                        </div>
                    </div>
                </div>

                <div class="card form-container">
                    <h3>Add Transaction</h3>
                    <form id="form">
                        <div class="form-control">
                            <label>Description</label>
                            <input type="text" id="text" placeholder="e.g., Grocery" required>
                        </div>
                        <div class="amount-grid">
                            <div class="form-control">
                                <label>Income (+)</label>
                                <input type="number" id="incomeText" placeholder="0.00">
                            </div>
                            <div class="form-control">
                                <label>Expense (-)</label>
                                <input type="number" id="expenseText" placeholder="0.00">
                            </div>
                        </div>
                        <div class="form-control">
                            <label>Date</label>
                            <input type="date" id="dateText" required>
                        </div>
                        <div class="form-control">
                            <label>Category</label>
                            <select id="categoryText">
                                <option value="Food">Food 🍔</option>
                                <option value="Travel">Travel ✈️</option>
                                <option value="Shopping">Shopping 🛍️</option>
                                <option value="Salary">Salary 💼</option>
                                <option value="Other">Other 💡</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Add Entry</button>
                    </form>
                </div>
            </aside>

            <main class="main-content">
                <div class="top-row">
                    <div class="card chart-box">
                        <div class="card-header">
                            <h3>Spending Split</h3>
                            <select id="monthFilter">
                                <option value="all">All Months</option>
                                <option value="01">January</option>
                                <option value="02">February</option>
                                <option value="03">March</option>
                                <option value="04">April</option>
                                <option value="05">May</option>
                                <option value="06">June</option>
                                <option value="07">July</option>
                                <option value="08">August</option>
                                <option value="09">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>

                    <div class="card summary-box">
                        <h3>Category Summary</h3>
                        <table id="categorySummary">
                            <thead>
                                <tr><th>Category</th><th>Total</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card history-box">
                    <div class="header-flex">
                        <h3>Transaction History</h3>
                        <button id="exportBtn" class="btn-secondary">Export CSV 📥</button>
                    </div>
                    <ul id="list" class="list"></ul>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
